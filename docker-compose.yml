services:
  postgres:
    image: postgres:16-alpine
    container_name: launchguard-postgres
    environment:
      POSTGRES_DB: launchguard
      POSTGRES_USER: launchguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-launchguard_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchguard -d launchguard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: launchguard-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://launchguard:${POSTGRES_PASSWORD:-launchguard_secret}@postgres:5432/launchguard
    volumes:
      - backend-sessions:/app/sessions
      - backend-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: launchguard-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  pgdata:
  backend-sessions:
  backend-logs:
