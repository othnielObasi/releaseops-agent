version: "3.9"

services:
  releaseops:
    build: .
    image: releaseops:latest
    container_name: releaseops
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - ORG_ID=${ORG_ID}
      - AUTH_URL=${AUTH_URL}
      - API_URL=${API_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
      - DEMO_MODE=${DEMO_MODE:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@releaseops.dev}
    volumes:
      - releaseops_data:/app/data
      - releaseops_sessions:/app/sessions
      - releaseops_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  releaseops_data:
  releaseops_sessions:
  releaseops_logs:
